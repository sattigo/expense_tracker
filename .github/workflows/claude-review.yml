name: Claude AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD -- '*.dart' '*.yaml' '*.json' | head -c 50000 > /tmp/diff.txt

      - name: Fetch PR comment history
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, os

          token = os.environ['GH_TOKEN']
          repo = os.environ['REPO']
          pr_number = os.environ['PR_NUMBER']

          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/issues/{pr_number}/comments?per_page=100',
              headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json'
              }
          )

          with urllib.request.urlopen(req) as resp:
              comments = json.loads(resp.read())

          history = []
          for c in comments:
              author = c['user']['login']
              date = c['created_at'][:10]
              body = c['body'].strip()
              history.append(f"[{date}] @{author}:\n{body}")

          result = "\n\n---\n\n".join(history) if history else "No previous comments."

          with open('/tmp/pr_history.txt', 'w') as f:
              f.write(result)
          PYEOF

      - name: Run Claude Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request

          rules = open('.github/CLAUDE_REVIEW_RULES.md').read()
          diff = open('/tmp/diff.txt').read()
          history = open('/tmp/pr_history.txt').read()
          pr_title = os.environ.get('PR_TITLE', '')
          pr_author = os.environ.get('PR_AUTHOR', '')

          user_msg = f"""PR Title: {pr_title}
PR Author: {pr_author}

## Previous review history for this PR
{history}

## Current diff to review
{diff}"""

          payload = json.dumps({
              'model': 'claude-sonnet-4-5',
              'max_tokens': 4096,
              'system': rules,
              'messages': [{'role': 'user', 'content': user_msg}]
          }).encode()

          req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=payload,
              headers={
                  'x-api-key': os.environ['ANTHROPIC_API_KEY'],
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json'
              }
          )

          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          text = next((b['text'] for b in data.get('content', []) if b.get('type') == 'text'), 'No review generated')

          with open('/tmp/review.txt', 'w') as f:
              f.write(text)
          PYEOF

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.txt', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Claude AI Code Review\n\n${review}\n\n---\n*Модель: claude-sonnet-4-5*`
            });
