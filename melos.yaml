name: expense_tracker

packages:
  - packages/*

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  format:
    description: Format all Dart files (excluding generated files) with line length 120
    run: >
      melos exec -- "find lib -name '*.dart'
      ! -name '*.g.dart'
      ! -name '*.freezed.dart'
      -print0 | xargs -0 dart format --line-length 120"

  gen:
    description: Run build_runner code generation in packages that depend on build_runner
    run: melos exec --depends-on="build_runner" -- dart run build_runner build --delete-conflicting-outputs

  analyze:
    description: Run flutter analyze in all packages
    run: melos exec -- flutter analyze

  test:
    description: Run flutter test in packages that have a test directory
    run: melos exec --dir-exists="test" -- flutter test

  reinit:
    description: Clean pub cache, clean melos workspace, bootstrap
    steps:
      - flutter pub cache clean -f
      - melos clean
      - melos bootstrap
